version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: speech_diag_backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - DIAG_POLL_INTERVAL=10
    volumes:
      - ./backend:/app
    networks:
      - diag_net
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: speech_diag_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - diag_net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: speech_diag_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - diag_net
    depends_on:
      - prometheus

  frontend:
    image: node:20-alpine
    container_name: speech_diag_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - diag_net
    depends_on:
      - backend

volumes:
  prometheus_data:
  grafana_data:

networks:
  diag_net:
    driver: bridge
